name: Agentic Security Scan

on:
  workflow_dispatch:
    inputs:
      scan_job_id:
        description: 'Scan job identifier from AgentDeploy'
        required: true
      report_title:
        description: 'Title for generated report'
        required: true
      source_repo:
        description: 'owner/repo to scan (optional; defaults to current repo)'
        required: false
      source_installation_id:
        description: 'GitHub App installation id for source repo (optional)'
        required: false
      template_id:
        description: 'Template id in AgentDeploy (optional)'
        required: false
      template_version:
        description: 'Template version in AgentDeploy (optional)'
        required: false
      seller_id:
        description: 'Seller user id in AgentDeploy (optional)'
        required: false

jobs:
  secure_scan_and_report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: read
    env:
      SCANNER_APP_ID: ${{ secrets.SCANNER_APP_ID }}
      SCANNER_APP_PRIVATE_KEY: ${{ secrets.SCANNER_APP_PRIVATE_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Resolve source repository
        id: source-repo
        shell: bash
        run: |
          SOURCE_REPO="${{ github.event.inputs.source_repo }}"
          if [ -z "$SOURCE_REPO" ]; then
            SOURCE_REPO="${{ github.repository }}"
          fi

          OWNER="${SOURCE_REPO%%/*}"
          REPO="${SOURCE_REPO#*/}"
          if [ -z "$OWNER" ] || [ -z "$REPO" ] || [ "$OWNER" = "$SOURCE_REPO" ]; then
            echo "Invalid source repo: $SOURCE_REPO" >&2
            exit 1
          fi

          echo "full=$SOURCE_REPO" >> "$GITHUB_OUTPUT"
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "name=$REPO" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token for source repository
        id: source-token
        if: ${{ env.SCANNER_APP_ID != '' && env.SCANNER_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SCANNER_APP_ID }}
          private-key: ${{ secrets.SCANNER_APP_PRIVATE_KEY }}
          owner: ${{ steps.source-repo.outputs.owner }}
          repositories: ${{ steps.source-repo.outputs.name }}

      - name: Validate GitHub App credentials
        if: ${{ env.SCANNER_APP_ID == '' || env.SCANNER_APP_PRIVATE_KEY == '' }}
        shell: bash
        run: |
          echo "Missing GitHub App credentials in workflow repository." >&2
          echo "Required secrets:" >&2
          echo "- app id: secrets.SCANNER_APP_ID" >&2
          echo "- private key: secrets.SCANNER_APP_PRIVATE_KEY" >&2
          exit 1

      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.source-repo.outputs.full }}
          token: ${{ steps.source-token.outputs.token || github.token }}
          fetch-depth: 1

      - name: Capture source commit
        id: source-commit
        shell: bash
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run TruffleHog
        id: trufflehog
        shell: bash
        run: |
          set +e
          docker run --rm             -v "$PWD:/repo"             trufflesecurity/trufflehog:latest             filesystem /repo --results=verified,unknown --json > trufflehog-output.json
          CODE=$?
          set -e

          if [ $CODE -eq 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi
          echo "exit_code=$CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run Semgrep
        id: semgrep
        shell: bash
        run: |
          set +e
          docker run --rm             -v "$PWD:/src"             -w /src             semgrep/semgrep:latest             semgrep --config p/security-audit --error --json > semgrep-output.json
          CODE=$?
          set -e

          if [ $CODE -eq 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi
          echo "exit_code=$CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: SecurityLab availability check
        id: seclab
        shell: bash
        run: |
          # SecurityLab agent is currently unavailable in runner environment.
          # Mark status truthfully so report/scoring does not claim full coverage.
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          echo "SecurityLab AI analysis skipped: runtime agent unavailable in workflow environment." > seclab-taskflow-output.txt
          echo "Fallback scanners executed: TruffleHog, Semgrep." >> seclab-taskflow-output.txt

      - name: Compile markdown report
        if: ${{ always() }}
        shell: bash
        run: |
          TRUFFLEHOG_OUTCOME="${{ steps.trufflehog.outputs.status || 'failure' }}"
          SEMGREP_OUTCOME="${{ steps.semgrep.outputs.status || 'failure' }}"
          SECLAB_STATUS="${{ steps.seclab.outputs.status }}"
          TEMPLATE_VERSION="${{ github.event.inputs.template_version || 'n/a' }}"
          SOURCE_COMMIT="${{ steps.source-commit.outputs.sha || 'unknown' }}"

          TRUFFLEHOG_DISPLAY="⚠️ Scan Failed"
          SEMGREP_DISPLAY="⚠️ Scan Failed"
          SECLAB_DISPLAY="⚠️ Scan Failed"

          if [ "$TRUFFLEHOG_OUTCOME" = "success" ]; then
            TRUFFLEHOG_DISPLAY="✅ No Findings"
          elif [ "$TRUFFLEHOG_OUTCOME" = "failure" ]; then
            TRUFFLEHOG_DISPLAY="🔴 Findings Detected"
          fi

          if [ "$SEMGREP_OUTCOME" = "success" ]; then
            SEMGREP_DISPLAY="✅ No Findings"
          elif [ "$SEMGREP_OUTCOME" = "failure" ]; then
            SEMGREP_DISPLAY="🔴 Findings Detected"
          fi

          if [ "$SECLAB_STATUS" = "executed" ]; then
            SECLAB_DISPLAY="✅ Completed"
          elif [ "$SECLAB_STATUS" = "skipped" ]; then
            SECLAB_DISPLAY="⏭️ Skipped (agent unavailable)"
          elif [ "$SECLAB_STATUS" = "failed" ]; then
            SECLAB_DISPLAY="⚠️ Execution Failed"
          fi

          TRUFFLEHOG_FINDINGS=0
          SEMGREP_FINDINGS=0
          if [ -s trufflehog-output.json ]; then
            TRUFFLEHOG_FINDINGS=$(jq -s 'length' trufflehog-output.json 2>/dev/null || echo 0)
          fi
          if [ -s semgrep-output.json ]; then
            SEMGREP_FINDINGS=$(jq '.results | length' semgrep-output.json 2>/dev/null || echo 0)
          fi
          TOTAL_FINDINGS=$((TRUFFLEHOG_FINDINGS + SEMGREP_FINDINGS))

          echo "# ${{ github.event.inputs.report_title }}" > report.md
          echo "" >> report.md
          echo "- Scan Job ID: ${{ github.event.inputs.scan_job_id }}" >> report.md
          echo "- Template ID: ${{ github.event.inputs.template_id || 'n/a' }}" >> report.md
          echo "- Template Version: $TEMPLATE_VERSION" >> report.md
          echo "- Repository: ${{ steps.source-repo.outputs.full }}" >> report.md
          echo "- Source Commit: $SOURCE_COMMIT" >> report.md
          echo "- Run ID: ${{ github.run_id }}" >> report.md
          echo "- Completed At: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> report.md
          echo "" >> report.md
          echo "## Security Tool Results" >> report.md
          echo "- TruffleHog: $TRUFFLEHOG_DISPLAY" >> report.md
          echo "- Semgrep: $SEMGREP_DISPLAY" >> report.md
          echo "- SecurityLab Taskflow Agent: $SECLAB_DISPLAY" >> report.md
          echo "- Findings: TruffleHog=$TRUFFLEHOG_FINDINGS, Semgrep=$SEMGREP_FINDINGS, Total=$TOTAL_FINDINGS" >> report.md
          echo "" >> report.md

          echo "## Findings Snapshot" >> report.md
          if [ "$TOTAL_FINDINGS" -eq 0 ]; then
            echo "- No findings detected by TruffleHog or Semgrep." >> report.md
          else
            if [ "$TRUFFLEHOG_FINDINGS" -gt 0 ]; then
              echo "### TruffleHog Findings (top 5)" >> report.md
              jq -r -s '.[:5][] | "- [(.DetectorName // "Secret")] (.SourceMetadata.Data.Git.file // "unknown file")"' trufflehog-output.json 2>/dev/null >> report.md || true
            fi
            if [ "$SEMGREP_FINDINGS" -gt 0 ]; then
              echo "### Semgrep Findings (top 5)" >> report.md
              jq -r '.results[:5][] | "- [(.extra.severity // "INFO")] (.check_id // "rule") at (.path // "unknown"):(.start.line // 0)"' semgrep-output.json 2>/dev/null >> report.md || true
            fi
          fi

          if [ -f seclab-taskflow-output.txt ]; then
            echo "" >> report.md
            echo "### SecurityLab Taskflow Agent Output (excerpt)" >> report.md
            echo '```text' >> report.md
            head -n 80 seclab-taskflow-output.txt >> report.md
            echo '```' >> report.md
          fi

      - name: Build machine-readable scan result
        if: ${{ always() }}
        shell: bash
        run: |
          TRUFFLEHOG_STATUS="${{ steps.trufflehog.outputs.status || 'failure' }}"
          SEMGREP_STATUS="${{ steps.semgrep.outputs.status || 'failure' }}"
          SECLAB_STATUS="${{ steps.seclab.outputs.status }}"
          SOURCE_COMMIT="${{ steps.source-commit.outputs.sha || '' }}"
          TEMPLATE_VERSION="${{ github.event.inputs.template_version || '' }}"

          SECRETS_RATING="A"
          SAST_RATING="A"
          PROMPT_INJECTION_RATING="A"
          DEPENDENCIES_RATING="A"
          PERMISSIONS_RATING="A"

          OVERALL_RATING="A"
          OVERALL_SCORE=95
          RISK_LEVEL="none"

          HIGH_COUNT=0
          MEDIUM_COUNT=0
          CRITICAL_COUNT=0
          COVERAGE_NOTE="Full tool coverage."

          if [ "$TRUFFLEHOG_STATUS" != "success" ]; then
            SECRETS_RATING="C"
            HIGH_COUNT=$((HIGH_COUNT + 1))
          fi

          if [ "$SEMGREP_STATUS" != "success" ]; then
            SAST_RATING="C"
            HIGH_COUNT=$((HIGH_COUNT + 1))
          fi

          if [ "$SECLAB_STATUS" = "skipped" ]; then
            PROMPT_INJECTION_RATING="B"
            DEPENDENCIES_RATING="B"
            PERMISSIONS_RATING="B"
            MEDIUM_COUNT=$((MEDIUM_COUNT + 1))
            COVERAGE_NOTE="SecurityLab skipped; AI-assisted checks unavailable in this run."
          elif [ "$SECLAB_STATUS" != "executed" ]; then
            PROMPT_INJECTION_RATING="C"
            DEPENDENCIES_RATING="C"
            PERMISSIONS_RATING="C"
            HIGH_COUNT=$((HIGH_COUNT + 1))
            COVERAGE_NOTE="SecurityLab failed to execute."
          elif [ -f seclab-taskflow-output.txt ]; then
            if grep -Eiq '(critical|remote code execution|token exfiltration|privilege escalation)' seclab-taskflow-output.txt; then
              PROMPT_INJECTION_RATING="C"
              DEPENDENCIES_RATING="C"
              PERMISSIONS_RATING="C"
              CRITICAL_COUNT=$((CRITICAL_COUNT + 1))
            elif grep -Eiq '(high|command injection|sql injection|supply chain|dependency confusion)' seclab-taskflow-output.txt; then
              PROMPT_INJECTION_RATING="C"
              DEPENDENCIES_RATING="C"
              PERMISSIONS_RATING="C"
              HIGH_COUNT=$((HIGH_COUNT + 1))
            elif grep -Eiq '(medium|moderate|unsafe default|weak validation)' seclab-taskflow-output.txt; then
              PROMPT_INJECTION_RATING="B"
              DEPENDENCIES_RATING="B"
              PERMISSIONS_RATING="B"
              MEDIUM_COUNT=$((MEDIUM_COUNT + 1))
            fi
          fi

          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            OVERALL_RATING="C"
            OVERALL_SCORE=58
            RISK_LEVEL="high"
          elif [ "$HIGH_COUNT" -gt 0 ]; then
            OVERALL_RATING="C"
            OVERALL_SCORE=66
            RISK_LEVEL="medium"
          elif [ "$MEDIUM_COUNT" -gt 0 ]; then
            OVERALL_RATING="B"
            OVERALL_SCORE=84
            RISK_LEVEL="low"
          else
            OVERALL_RATING="A"
            OVERALL_SCORE=95
            RISK_LEVEL="none"
          fi

          cat > scan-result.json <<EOF_JSON
          {
            "overallRating": "$OVERALL_RATING",
            "overallScore": $OVERALL_SCORE,
            "riskLevel": "$RISK_LEVEL",
            "sourceCommitSha": "$SOURCE_COMMIT",
            "templateVersion": "$TEMPLATE_VERSION",
            "severityCounts": {
              "low": 0,
              "medium": $MEDIUM_COUNT,
              "high": $HIGH_COUNT,
              "critical": $CRITICAL_COUNT
            },
            "categoryRatings": {
              "secrets": "$SECRETS_RATING",
              "promptInjection": "$PROMPT_INJECTION_RATING",
              "dependencies": "$DEPENDENCIES_RATING",
              "permissions": "$PERMISSIONS_RATING",
              "sast": "$SAST_RATING"
            },
            "summary": "Automated workflow scan completed. $COVERAGE_NOTE",
            "recommendations": [
              "Review workflow logs and repository findings in detail.",
              "If SecurityLab is unavailable, use this report as baseline and run supplemental manual review.",
              "Address any non-success tool outcomes before publishing."
            ]
          }
          EOF_JSON

          {
            echo ""
            echo "## Overall Result"
            echo "- Overall Rating: $OVERALL_RATING"
            echo "- Overall Score: $OVERALL_SCORE/100"
            echo "- Risk Level: $RISK_LEVEL"
            echo "- Coverage Note: $COVERAGE_NOTE"
          } >> report.md

      - name: Install PDF tooling
        if: ${{ always() }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc wkhtmltopdf

      - name: Convert markdown to PDF
        if: ${{ always() }}
        shell: bash
        run: |
          mkdir -p pdf_output
          if ! pandoc report.md -o pdf_output/report.pdf --pdf-engine=wkhtmltopdf; then
            printf '%s\n' '<html><body><h1>Scan Report</h1><p>Primary markdown to PDF conversion failed. See artifacts for details.</p></body></html>' > pdf_output/fallback.html
            wkhtmltopdf pdf_output/fallback.html pdf_output/report.pdf
          fi

      - name: Upload report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: Certified-Security-Report
          path: |
            pdf_output/report.pdf
            scan-result.json
            seclab-taskflow-output.txt
            trufflehog-output.json
            semgrep-output.json
          retention-days: 7
          if-no-files-found: warn
